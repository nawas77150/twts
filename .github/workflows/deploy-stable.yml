name: Deploy Stable

on:
  repository_dispatch:
    types: [deploy-stable] # Triggered by release-please after a release is created
  workflow_dispatch: # Manual trigger for first deploy or emergencies
    inputs:
      tag:
        description: 'Tag to deploy (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  deploy-stable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.tag || github.event.inputs.tag }}

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel Environment (Stable)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN_STABLE }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_STABLE }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STABLE }}

      - name: Build with Vercel (Stable)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN_STABLE }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_STABLE }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STABLE }}

      - name: Deploy to Vercel (Stable — Production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN_STABLE }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_STABLE }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STABLE }}
